# New two-axis preset design.
# - size_presets: model capacity/architecture
# - context_presets: sequence/context policy
size_presets:
  # Current baseline (non-MoE): ~64M
  dense_64m:
    model_variant: minimind
    use_moe: 0
    hidden_size: 768
    num_hidden_layers: 8
    num_attention_heads: 8
    num_key_value_heads: 4

  # Current baseline (MoE): ~198M total / ~64M active
  moe_198m_a64m:
    model_variant: minimind
    use_moe: 1
    hidden_size: 768
    num_hidden_layers: 8
    num_attention_heads: 8
    num_key_value_heads: 4
    num_experts: 4
    num_experts_per_tok: 1

  # Example larger dense preset (~1B class, tune as needed)
  dense_1b:
    model_variant: minimind
    use_moe: 0
    hidden_size: 2048
    num_hidden_layers: 24
    num_attention_heads: 16
    num_key_value_heads: 8

  # Example larger dense preset (~2B class, tune as needed)
  dense_2b:
    model_variant: minimind
    use_moe: 0
    hidden_size: 2560
    num_hidden_layers: 28
    num_attention_heads: 20
    num_key_value_heads: 10

  # Optional MHC baseline preset matching current 64M-scale defaults
  mhc_64m_balm:
    model_variant: mhc
    use_moe: 0
    hidden_size: 768
    num_hidden_layers: 8
    num_attention_heads: 8
    num_key_value_heads: 4
    hc_mult: 4
    hc_iters: 20
    hc_projector: balm
    hc_balm_r: 1.0
    hc_balm_diag_cost: 0.0
    hc_balm_offdiag_cost: 0.0
    hc_balm_cost_scale: 1.0
    # hc_balm_kernel: triton

  mhc_64m_sinkhorn:
    model_variant: mhc
    use_moe: 0
    hidden_size: 768
    num_hidden_layers: 8
    num_attention_heads: 8
    num_key_value_heads: 4
    hc_mult: 4
    hc_iters: 20
    hc_projector: sinkhorn
  
  mhc_1b_balm:
    model_variant: mhc
    use_moe: 0
    hidden_size: 2048
    num_hidden_layers: 24
    num_attention_heads: 16
    num_key_value_heads: 8
    hc_mult: 4
    hc_iters: 20
    hc_projector: balm
    hc_balm_r: 1.0
    hc_balm_diag_cost: 0.0
    hc_balm_offdiag_cost: 0.0
    hc_balm_cost_scale: 1.0
    # hc_balm_kernel: triton
  
  mhc_1b_sinkhorn:
    model_variant: mhc
    use_moe: 0
    hidden_size: 2048
    num_hidden_layers: 24
    num_attention_heads: 16
    num_key_value_heads: 8
    hc_mult: 4
    hc_iters: 20
    hc_projector: sinkhorn

context_presets:
  ctx_340:
    max_seq_len: 340
    max_position_embeddings: 2048

  ctx_1024:
    max_seq_len: 1024
    max_position_embeddings: 4096

  ctx_2048:
    max_seq_len: 2048
    max_position_embeddings: 8192
